<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nestify | Dashboard</title>
    <link rel="stylesheet" href="login.css">
    <script src="config.js"></script>
</head>
<body>
<div class="container">
    <h2>Dashboard</h2>
    <div class="subtitle">You have logged in successfully</div>

    <div class="dashboard-box">
        <p><strong>Name:</strong> <span id="user-name">Loading...</span></p>
        <p><strong>Email:</strong> <span id="user-email">Loading...</span></p>
        <p><strong>Status:</strong> Logged In</p>
    </div>

    <p><a href="#" id="logout-link">Logout</a></p>
</div>

<script>
// Check if user is logged in
function checkAuth() {
    const user = localStorage.getItem('user');
    
    if (!user) {
        // Redirect to login if not logged in
        window.location.href = 'login.html';
        return;
    }
    
    // Parse and display user info
    const userData = JSON.parse(user);
    document.getElementById('user-name').textContent = userData.name;
    document.getElementById('user-email').textContent = userData.email;
}

// Handle logout
document.getElementById('logout-link').addEventListener('click', async function(e) {
    e.preventDefault();
    
    try {
        const response = await fetch(`${window.ENV_API_BASE}/auth/logout`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            }
        });
        
        const result = await response.json();
        
        if (result.success) {
            // Clear localStorage and redirect to login
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }
    } catch (error) {
        console.error('Logout error:', error);
        // Still clear localStorage and redirect on error
        localStorage.removeItem('user');
        window.location.href = 'login.html';
    }
});

// Check authentication when page loads
document.addEventListener("DOMContentLoaded", function () {
    checkAuth();
});
</script>

</body>
</html>
